### model
model_name_or_path: /mnt/xlab-nas-wm/gaozhe.gz/hf_datasets/Qwen2.5-VL-3B-Instruct/
image_max_pixels: 2048
video_max_pixels: 2048
trust_remote_code: true

### method
stage: sft
do_train: true
do_eval: false
do_predict: false # 太慢了，时候一并跑vllm脚本
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z2_config.json

### dataset
dataset: cot_24k_samesys_1vs4
dataset_dir: data
template: qwen2_vl
cutoff_len: 8192
max_samples: 18000
preprocessing_num_workers: 16
dataloader_num_workers: 4

# ✅ eval：从训练集中切分
val_size: 0.1
eval_strategy: steps
eval_steps: 800
per_device_eval_batch_size: 16
predict_with_generate: true
max_new_tokens: 512

# ✅ predict：指定一个“独立数据集名”，用于落盘生成结果
# （建议用同一个文件，只是 dataset_info.json 里挂一个新名字）
# predict_dataset: cot_24k_samesys_pred
# 先抽样看 pattern，满意了再关掉或调大
# max_predict_samples: 200
# per_device_predict_batch_size: 2

### random_vision（你当前关掉就行）
random_vision: false
default_image_path: /mnt/xlab-nas-wm/gaozhe.gz/codes/DeepEyes/clips/placeholder.png
default_video_path: /mnt/xlab-nas-wm/gaozhe.gz/codes/DeepEyes/clips/0r8Cl8Q31rM_retriever_clip_1_0.0_10.0.mp4

### output
output_dir: saves/qwen2_5-vl-3b/full/sft-07-samesys-1vs4
logging_steps: 10
save_steps: 50
plot_loss: true
overwrite_output_dir: false
save_only_model: false
report_to: wandb

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.07
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: true

### generation (predict/eval 都用)
temperature: 0.0
do_sample: false
