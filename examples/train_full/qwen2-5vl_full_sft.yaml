### model
model_name_or_path: /mnt/xlab-nas-wm/gaozhe.gz/hf_datasets/Qwen2.5-VL-3B-Instruct/
image_max_pixels: 2048
video_max_pixels: 2048
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z2_config.json

### dataset
dataset: cot_24k  # 改为你的数据集名称
dataset_dir: data  # 指定 dataset_info.json 所在目录
template: qwen2_vl
cutoff_len: 2048
max_samples: 17000  # 可选：限制样本数量，设为 null 使用全部数据
preprocessing_num_workers: 16
dataloader_num_workers: 4

### 如果要使用 random_vision 功能，添加以下参数：
random_vision: false  # 启用 random_vision
default_image_path: /mnt/xlab-nas-wm/gaozhe.gz/codes/DeepEyes/clips/placeholder.png  # 默认图片路径
default_video_path: /mnt/xlab-nas-wm/gaozhe.gz/codes/DeepEyes/clips/0r8Cl8Q31rM_retriever_clip_1_0.0_10.0.mp4  # 默认视频路径

### output
output_dir: saves/qwen2_5-vl-3b/full/sft-03
# resume_from_checkpoint: true
logging_steps: 10
save_steps: 50
plot_loss: true
overwrite_output_dir: false
save_only_model: false
report_to: wandb

### train
per_device_train_batch_size: 16
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: true

### eval
val_size: 0.1
per_device_eval_batch_size: 32
eval_strategy: steps
eval_steps: 80
